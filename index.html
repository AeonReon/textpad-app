<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TextPad</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TextPad">
    <meta name="theme-color" content="#F7F4EE">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="images/icon-512.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            /* Surfaces — warm ivory page, white cards */
            --bg: #F7F4EE;
            --surface: #FFFFFF;
            --surface-2: #F0EBE0;
            --card: #FAF6EC;
            --card-hover: #ECE4D2;

            /* Ink */
            --text: #1A2433;
            --text-dim: #5A6577;
            --text-faint: #9CA3AF;
            --ink-deep: #0E1623;

            /* Accent — gold (from icon paper) */
            --accent: #D9A02D;
            --accent-bright: #F2BB44;
            --accent-dim: #A8771A;
            --accent-glow: rgba(217, 160, 45, 0.14);

            /* Secondary accent — blue (from icon backdrop) */
            --blue: #2D7AB8;
            --blue-dim: #1F5A8E;
            --blue-glow: rgba(45, 122, 184, 0.14);

            /* Lines */
            --border: rgba(217, 160, 45, 0.22);
            --border-strong: rgba(217, 160, 45, 0.45);
            --line: #EAE2CD;

            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(80, 50, 30, 0.06);
            --shadow:    0 8px 22px rgba(80, 50, 30, 0.10);
            --shadow-lg: 0 18px 50px rgba(80, 50, 30, 0.16);

            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* ===== DARK THEME ===== sky-blue + yellow, pulled from the app icons */
        :root[data-theme="dark"] {
            --bg: #103464;
            --surface: #1A4380;
            --surface-2: #245599;
            --card: #1F4A8C;
            --card-hover: #2A5BA8;

            --text: #FFF6E0;
            --text-dim: #B5C8E0;
            --text-faint: #708FB2;
            --ink-deep: #0A2042;

            --accent: #FFCC44;
            --accent-bright: #FFDD66;
            --accent-dim: #E5A82A;
            --accent-glow: rgba(255, 204, 68, 0.22);

            --blue: #4FA3E0;
            --blue-dim: #2D7AB8;
            --blue-glow: rgba(79, 163, 224, 0.22);

            --border: rgba(255, 204, 68, 0.22);
            --border-strong: rgba(255, 204, 68, 0.42);
            --line: rgba(255, 255, 255, 0.10);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.30);
            --shadow:    0 8px 22px rgba(0, 0, 0, 0.40);
            --shadow-lg: 0 18px 50px rgba(0, 0, 0, 0.50);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: calc(20px + var(--safe-top)) 16px calc(100px + var(--safe-bottom)) 16px;
        }

        /* ====== HEADER ====== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: var(--shadow-sm);
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .header-actions { display: flex; gap: 8px; }

        .back-btn, .sort-btn {
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 12px;
            padding: 10px 16px;
            color: var(--accent-dim);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            transition: transform 0.1s;
        }

        .back-btn:active, .sort-btn:active { transform: scale(0.97); }
        .back-btn.visible, .sort-btn.visible { display: flex; }

        .header-actions { display: flex; align-items: center; gap: 8px; }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .theme-toggle:active { transform: scale(0.94); }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        /* ====== GOLD DIVIDER ====== */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--blue), var(--accent), transparent);
            margin: 4px 0 24px;
            opacity: 0.5;
        }

        /* ====== SEARCH BAR ====== */
        .search-bar {
            position: relative;
            margin-bottom: 16px;
        }

        .search-bar input {
            width: 100%;
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 12px 18px 12px 42px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .search-bar input::placeholder { color: var(--text-faint); }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            font-size: 16px;
            pointer-events: none;
        }

        /* ====== NEW NOTE BUTTON ====== */
        .btn-new-note {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            border: none;
            border-radius: 14px;
            padding: 15px;
            color: var(--ink-deep);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(217, 160, 45, 0.32);
            transition: box-shadow 0.15s, transform 0.1s;
            margin-bottom: 20px;
        }

        .btn-new-note:hover { box-shadow: 0 6px 18px rgba(217, 160, 45, 0.42); }
        .btn-new-note:active { transform: scale(0.98); }

        .btn-new-note .plus {
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }

        /* ====== NOTE CARDS ====== */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .note-card {
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 16px;
            padding: 18px 20px 18px 26px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s, box-shadow 0.2s;
            animation: slideIn 0.25s ease-out;
            position: relative;
            overflow: hidden;
        }

        .note-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
        .note-card:active { transform: scale(0.98); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 10px;
        }

        .card-time {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .card-preview {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .card-chars {
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .card-delete {
            background: none;
            border: none;
            color: var(--text-faint);
            font-size: 20px;
            padding: 4px 8px;
            cursor: pointer;
            transition: color 0.2s;
            opacity: 0;
        }

        .note-card:hover .card-delete { opacity: 1; }
        .card-delete:hover { color: #C75C5C; }
        .card-delete:active { color: #B14545 !important; }

        /* ====== NOTE COLOUR STRIP ====== */
        .note-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
        }

        .note-card[data-color="blue"]::before { background: var(--blue); }
        .note-card[data-color="gold"]::before { background: var(--accent); }
        .note-card[data-color="teal"]::before { background: #2A9D8F; }
        .note-card[data-color="purple"]::before { background: #7C5CBF; }
        .note-card[data-color="coral"]::before { background: #E07A5F; }

        /* ====== EDITOR VIEW ====== */
        .editor-view { display: none; }
        .editor-view.active { display: block; }
        .master-view.hidden { display: none; }

        .editor-title-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 2px solid var(--border-strong);
            padding: 8px 0 12px;
            color: var(--text);
            font-size: 22px;
            font-weight: 700;
            outline: none;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .editor-title-input:focus {
            border-color: var(--accent);
        }

        .editor-title-input::placeholder { color: var(--text-faint); }

        .editor-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-stats {
            font-size: 12px;
            color: var(--text-dim);
        }

        .color-picker {
            display: flex;
            gap: 8px;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-dot:active { transform: scale(0.9); }
        .color-dot.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text); }

        .color-dot[data-c="gold"] { background: var(--accent); }
        .color-dot[data-c="blue"] { background: var(--blue); }
        .color-dot[data-c="teal"] { background: #2A9D8F; }
        .color-dot[data-c="purple"] { background: #7C5CBF; }
        .color-dot[data-c="coral"] { background: #E07A5F; }

        .editor-textarea {
            width: 100%;
            min-height: calc(100dvh - 300px);
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 16px;
            padding: 20px;
            color: var(--text);
            font-size: 16px;
            line-height: 1.7;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            outline: none;
            resize: none;
            transition: box-shadow 0.2s;
        }

        .editor-textarea:focus {
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .editor-textarea::placeholder { color: var(--text-faint); }

        /* ====== EMPTY STATE ====== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 42px;
            margin-bottom: 14px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 15px; line-height: 1.5; }

        /* ====== CONFIRM DIALOG ====== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 36, 51, 0.32);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.15s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .confirm-box {
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 300px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .confirm-box p { font-size: 16px; margin-bottom: 20px; line-height: 1.4; color: var(--text); }

        .confirm-buttons { display: flex; gap: 10px; }

        .confirm-buttons button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            color: var(--text);
        }

        .btn-confirm-delete {
            background: #C75C5C;
            color: #fff;
        }
        .btn-confirm-delete:hover { background: #B14545; }

        /* ====== NOTES COUNT ====== */
        .notes-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-left: 2px;
        }

        /* ====== CLEAR ALL ====== */
        .clear-all-bar {
            margin-top: 28px;
            text-align: center;
        }

        .btn-clear-all {
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, #C75C5C, #8E3B3B) border-box;
            border: 1.5px solid transparent;
            color: #C75C5C;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }

        .btn-clear-all:hover { transform: translateY(-1px); }
        .btn-clear-all:active { background: #C75C5C; color: #fff; transform: scale(0.97); }

        /* ====== AUTOSAVE TOAST ====== */
        .toast {
            position: fixed;
            bottom: calc(30px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background:
                linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--blue)) border-box;
            border: 1.5px solid transparent;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            color: var(--accent-dim);
            font-weight: 700;
            z-index: 50;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-left">
                <img src="images/icon-512.png" class="app-icon" alt="TextPad">
                <div>
                    <h1>TextPad</h1>
                    <div class="date-label" id="dateLabel"></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Notes</button>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                </button>
            </div>
        </header>

        <div class="gold-divider"></div>

        <!-- MASTER VIEW -->
        <div class="master-view" id="masterView">
            <div class="search-bar">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off" oninput="renderMaster()">
            </div>
            <button class="btn-new-note" onclick="createNote()">
                <span class="plus">+</span> New Note
            </button>
            <div class="notes-count" id="notesCount"></div>
            <div class="cards-container" id="cardsContainer"></div>
        </div>

        <!-- EDITOR VIEW -->
        <div class="editor-view" id="editorView">
            <input type="text" class="editor-title-input" id="editorTitle" placeholder="Note title..." autocomplete="off" oninput="onEdit()">
            <div class="editor-meta">
                <div class="editor-stats" id="editorStats"></div>
                <div class="color-picker" id="colorPicker">
                    <div class="color-dot active" data-c="gold" onclick="setColor('gold')"></div>
                    <div class="color-dot" data-c="blue" onclick="setColor('blue')"></div>
                    <div class="color-dot" data-c="teal" onclick="setColor('teal')"></div>
                    <div class="color-dot" data-c="purple" onclick="setColor('purple')"></div>
                    <div class="color-dot" data-c="coral" onclick="setColor('coral')"></div>
                </div>
            </div>
            <textarea class="editor-textarea" id="editorTextarea" placeholder="Start writing..." oninput="onEdit()"></textarea>
        </div>
    </div>

    <div class="toast" id="toast">Saved</div>

    <script>
        // Theme — light is default; choice persists in localStorage.
        (function initTheme() {
            const saved = localStorage.getItem('textpad_theme');
            const theme = saved === 'dark' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', theme === 'dark' ? '#103464' : '#F7F4EE');
        })();
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('textpad_theme', next);
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', next === 'dark' ? '#103464' : '#F7F4EE');
        }

        // State
        let notes = JSON.parse(localStorage.getItem('textpad_notes') || '[]');
        let currentNote = null;
        let saveTimeout = null;

        function save() {
            localStorage.setItem('textpad_notes', JSON.stringify(notes));
        }

        // Date
        document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        // Escape HTML
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Time formatting
        function timeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        // ====== NAVIGATION ======
        function openNote(index) {
            currentNote = index;
            const note = notes[index];
            document.getElementById('editorTitle').value = note.title;
            document.getElementById('editorTextarea').value = note.body;
            updateStats();
            updateColorPicker(note.color || 'gold');

            document.getElementById('masterView').classList.add('hidden');
            document.getElementById('editorView').classList.add('active');
            document.getElementById('backBtn').classList.add('visible');

            // Focus textarea on mobile after a tick
            setTimeout(() => document.getElementById('editorTextarea').focus(), 100);
        }

        function goBack() {
            // Save before leaving
            if (currentNote !== null) {
                saveCurrentNote();
                // Remove empty notes
                const note = notes[currentNote];
                if (!note.title.trim() && !note.body.trim()) {
                    notes.splice(currentNote, 1);
                    save();
                }
            }
            currentNote = null;
            document.getElementById('editorView').classList.remove('active');
            document.getElementById('masterView').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('visible');
            document.getElementById('searchInput').value = '';
            renderMaster();
        }

        // ====== MASTER VIEW ======
        function renderMaster() {
            const container = document.getElementById('cardsContainer');
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            const filtered = notes.map((n, i) => ({ ...n, _i: i }))
                .filter(n => !query ||
                    n.title.toLowerCase().includes(query) ||
                    n.body.toLowerCase().includes(query)
                );

            const countEl = document.getElementById('notesCount');
            if (notes.length === 0) {
                countEl.textContent = '';
            } else if (query && filtered.length !== notes.length) {
                countEl.textContent = `${filtered.length} of ${notes.length} notes`;
            } else {
                countEl.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
            }

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">T</div>
                        <p>No notes yet.<br>Tap "New Note" to get started.</p>
                    </div>`;
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#128269;</div>
                        <p>No notes match your search.</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(note => {
                const title = note.title.trim() || 'Untitled';
                const preview = note.body.trim() ? note.body.substring(0, 120).replace(/\n/g, ' ') : 'Empty note';
                const chars = note.body.length;
                const words = note.body.trim() ? note.body.trim().split(/\s+/).length : 0;
                return `
                <div class="note-card" data-color="${note.color || 'gold'}" onclick="openNote(${note._i})">
                    <div class="card-top">
                        <div class="card-title">${esc(title)}</div>
                        <span class="card-time">${timeAgo(note.updated)}</span>
                    </div>
                    <div class="card-preview">${esc(preview)}</div>
                    <div class="card-footer">
                        <span class="card-chars">${words} words &middot; ${chars} chars</span>
                        <button class="card-delete" onclick="event.stopPropagation(); confirmDelete(${note._i})" title="Delete">&times;</button>
                    </div>
                </div>`;
            }).join('') + (notes.length > 1 && !query ? `
                <div class="clear-all-bar">
                    <button class="btn-clear-all" onclick="confirmClearAll()">Delete All Notes</button>
                </div>` : '');
        }

        // ====== EDITOR ======
        function onEdit() {
            if (currentNote === null) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveCurrentNote();
                showToast();
            }, 600);
            updateStats();
        }

        function saveCurrentNote() {
            if (currentNote === null) return;
            const title = document.getElementById('editorTitle').value;
            const body = document.getElementById('editorTextarea').value;
            notes[currentNote].title = title;
            notes[currentNote].body = body;
            notes[currentNote].updated = Date.now();
            save();
        }

        function updateStats() {
            const body = document.getElementById('editorTextarea').value;
            const chars = body.length;
            const words = body.trim() ? body.trim().split(/\s+/).length : 0;
            const lines = body ? body.split('\n').length : 0;
            document.getElementById('editorStats').textContent = `${words} words \u00B7 ${chars} chars \u00B7 ${lines} lines`;
        }

        function updateColorPicker(color) {
            document.querySelectorAll('.color-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.c === color);
            });
        }

        function setColor(color) {
            if (currentNote === null) return;
            notes[currentNote].color = color;
            updateColorPicker(color);
            save();
        }

        // ====== ACTIONS ======
        function createNote() {
            const note = {
                title: '',
                body: '',
                color: 'gold',
                created: Date.now(),
                updated: Date.now()
            };
            notes.unshift(note);
            save();
            openNote(0);
        }

        function confirmDelete(index) {
            const title = notes[index].title.trim() || 'Untitled';
            showConfirm(`Delete "${esc(title)}"?`, () => {
                notes.splice(index, 1);
                save();
                if (currentNote !== null) goBack();
                else renderMaster();
            });
        }

        function confirmClearAll() {
            showConfirm('Delete all notes?', () => {
                notes = [];
                save();
                renderMaster();
            });
        }

        function showConfirm(msg, onYes) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <p>${msg}</p>
                    <div class="confirm-buttons">
                        <button class="btn-cancel">Cancel</button>
                        <button class="btn-confirm-delete">Delete</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.btn-cancel').onclick = () => overlay.remove();
            overlay.querySelector('.btn-confirm-delete').onclick = () => { overlay.remove(); onYes(); };
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Init
        renderMaster();
    </script>
</body>
</html>
