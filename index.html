<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TextPad</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TextPad">
    <meta name="theme-color" content="#0a1628">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a1628;
            --surface: #111d35;
            --card: #162544;
            --card-hover: #1a2d52;
            --accent: #d4a853;
            --accent-glow: rgba(212, 168, 83, 0.15);
            --accent-dim: #a07d3a;
            --blue: #2a6fc9;
            --blue-glow: rgba(42, 111, 201, 0.15);
            --text: #e8e4dc;
            --text-dim: #6b7a94;
            --border: rgba(212, 168, 83, 0.12);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: calc(20px + var(--safe-top)) 16px calc(100px + var(--safe-bottom)) 16px;
        }

        /* ====== HEADER ====== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 2px 12px rgba(212, 168, 83, 0.2);
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .header-actions { display: flex; gap: 8px; }

        .back-btn, .sort-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .back-btn:active, .sort-btn:active { background: var(--card-hover); }
        .back-btn.visible, .sort-btn.visible { display: flex; }

        /* ====== GOLD DIVIDER ====== */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), var(--accent), var(--accent-glow), transparent);
            margin: 4px 0 24px;
            opacity: 0.5;
        }

        /* ====== SEARCH BAR ====== */
        .search-bar {
            position: relative;
            margin-bottom: 16px;
        }

        .search-bar input {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px 12px 42px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .search-bar input::placeholder { color: var(--text-dim); }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 16px;
            pointer-events: none;
        }

        /* ====== NEW NOTE BUTTON ====== */
        .btn-new-note {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #c4953f);
            border: none;
            border-radius: 14px;
            padding: 15px;
            color: var(--bg);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }

        .btn-new-note:active { opacity: 0.85; transform: scale(0.98); }

        .btn-new-note .plus {
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }

        /* ====== NOTE CARDS ====== */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .note-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideIn 0.25s ease-out;
            position: relative;
        }

        .note-card:active { background: var(--card); transform: scale(0.98); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 10px;
        }

        .card-time {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .card-preview {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .card-chars {
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .card-delete {
            background: none;
            border: none;
            color: transparent;
            font-size: 20px;
            padding: 4px 8px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .note-card:hover .card-delete,
        .note-card:active .card-delete { color: var(--text-dim); }
        .card-delete:active { color: #e05555 !important; }

        /* ====== NOTE COLOUR STRIP ====== */
        .note-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 14px;
            bottom: 14px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
            opacity: 0.5;
        }

        .note-card[data-color="blue"]::before { background: var(--blue); }
        .note-card[data-color="gold"]::before { background: var(--accent); }
        .note-card[data-color="teal"]::before { background: #2a9d8f; }
        .note-card[data-color="purple"]::before { background: #7c5cbf; }
        .note-card[data-color="coral"]::before { background: #e07a5f; }

        /* ====== EDITOR VIEW ====== */
        .editor-view { display: none; }
        .editor-view.active { display: block; }
        .master-view.hidden { display: none; }

        .editor-title-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 8px 0 12px;
            color: var(--text);
            font-size: 22px;
            font-weight: 700;
            outline: none;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .editor-title-input:focus {
            border-color: var(--accent);
        }

        .editor-title-input::placeholder { color: var(--text-dim); }

        .editor-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-stats {
            font-size: 12px;
            color: var(--text-dim);
        }

        .color-picker {
            display: flex;
            gap: 8px;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-dot:active { transform: scale(0.9); }
        .color-dot.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text-dim); }

        .color-dot[data-c="gold"] { background: var(--accent); }
        .color-dot[data-c="blue"] { background: var(--blue); }
        .color-dot[data-c="teal"] { background: #2a9d8f; }
        .color-dot[data-c="purple"] { background: #7c5cbf; }
        .color-dot[data-c="coral"] { background: #e07a5f; }

        .editor-textarea {
            width: 100%;
            min-height: calc(100dvh - 300px);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            color: var(--text);
            font-size: 16px;
            line-height: 1.7;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            outline: none;
            resize: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .editor-textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .editor-textarea::placeholder { color: var(--text-dim); }

        /* ====== EMPTY STATE ====== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 42px;
            margin-bottom: 14px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 15px; line-height: 1.5; }

        /* ====== CONFIRM DIALOG ====== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.15s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 300px;
            width: 100%;
            text-align: center;
        }

        .confirm-box p { font-size: 16px; margin-bottom: 20px; line-height: 1.4; }

        .confirm-buttons { display: flex; gap: 10px; }

        .confirm-buttons button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-confirm-delete {
            background: #c0392b;
            color: #fff;
        }

        /* ====== NOTES COUNT ====== */
        .notes-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-left: 2px;
        }

        /* ====== CLEAR ALL ====== */
        .clear-all-bar {
            margin-top: 28px;
            text-align: center;
        }

        .btn-clear-all {
            background: none;
            border: 1px solid rgba(192, 57, 43, 0.3);
            color: #c0392b;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-all:active { background: #c0392b; color: #fff; }

        /* ====== AUTOSAVE TOAST ====== */
        .toast {
            position: fixed;
            bottom: calc(30px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            z-index: 50;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-left">
                <img src="images/icon.png" class="app-icon" alt="TextPad">
                <div>
                    <h1>TextPad</h1>
                    <div class="date-label" id="dateLabel"></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Notes</button>
            </div>
        </header>

        <div class="gold-divider"></div>

        <!-- MASTER VIEW -->
        <div class="master-view" id="masterView">
            <div class="search-bar">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off" oninput="renderMaster()">
            </div>
            <button class="btn-new-note" onclick="createNote()">
                <span class="plus">+</span> New Note
            </button>
            <div class="notes-count" id="notesCount"></div>
            <div class="cards-container" id="cardsContainer"></div>
        </div>

        <!-- EDITOR VIEW -->
        <div class="editor-view" id="editorView">
            <input type="text" class="editor-title-input" id="editorTitle" placeholder="Note title..." autocomplete="off" oninput="onEdit()">
            <div class="editor-meta">
                <div class="editor-stats" id="editorStats"></div>
                <div class="color-picker" id="colorPicker">
                    <div class="color-dot active" data-c="gold" onclick="setColor('gold')"></div>
                    <div class="color-dot" data-c="blue" onclick="setColor('blue')"></div>
                    <div class="color-dot" data-c="teal" onclick="setColor('teal')"></div>
                    <div class="color-dot" data-c="purple" onclick="setColor('purple')"></div>
                    <div class="color-dot" data-c="coral" onclick="setColor('coral')"></div>
                </div>
            </div>
            <textarea class="editor-textarea" id="editorTextarea" placeholder="Start writing..." oninput="onEdit()"></textarea>
        </div>
    </div>

    <div class="toast" id="toast">Saved</div>

    <script>
        // State
        let notes = JSON.parse(localStorage.getItem('textpad_notes') || '[]');
        let currentNote = null;
        let saveTimeout = null;

        function save() {
            localStorage.setItem('textpad_notes', JSON.stringify(notes));
        }

        // Date
        document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        // Escape HTML
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Time formatting
        function timeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        // ====== NAVIGATION ======
        function openNote(index) {
            currentNote = index;
            const note = notes[index];
            document.getElementById('editorTitle').value = note.title;
            document.getElementById('editorTextarea').value = note.body;
            updateStats();
            updateColorPicker(note.color || 'gold');

            document.getElementById('masterView').classList.add('hidden');
            document.getElementById('editorView').classList.add('active');
            document.getElementById('backBtn').classList.add('visible');

            // Focus textarea on mobile after a tick
            setTimeout(() => document.getElementById('editorTextarea').focus(), 100);
        }

        function goBack() {
            // Save before leaving
            if (currentNote !== null) {
                saveCurrentNote();
                // Remove empty notes
                const note = notes[currentNote];
                if (!note.title.trim() && !note.body.trim()) {
                    notes.splice(currentNote, 1);
                    save();
                }
            }
            currentNote = null;
            document.getElementById('editorView').classList.remove('active');
            document.getElementById('masterView').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('visible');
            document.getElementById('searchInput').value = '';
            renderMaster();
        }

        // ====== MASTER VIEW ======
        function renderMaster() {
            const container = document.getElementById('cardsContainer');
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            const filtered = notes.map((n, i) => ({ ...n, _i: i }))
                .filter(n => !query ||
                    n.title.toLowerCase().includes(query) ||
                    n.body.toLowerCase().includes(query)
                );

            const countEl = document.getElementById('notesCount');
            if (notes.length === 0) {
                countEl.textContent = '';
            } else if (query && filtered.length !== notes.length) {
                countEl.textContent = `${filtered.length} of ${notes.length} notes`;
            } else {
                countEl.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
            }

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">T</div>
                        <p>No notes yet.<br>Tap "New Note" to get started.</p>
                    </div>`;
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#128269;</div>
                        <p>No notes match your search.</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(note => {
                const title = note.title.trim() || 'Untitled';
                const preview = note.body.trim() ? note.body.substring(0, 120).replace(/\n/g, ' ') : 'Empty note';
                const chars = note.body.length;
                const words = note.body.trim() ? note.body.trim().split(/\s+/).length : 0;
                return `
                <div class="note-card" data-color="${note.color || 'gold'}" onclick="openNote(${note._i})">
                    <div class="card-top">
                        <div class="card-title">${esc(title)}</div>
                        <span class="card-time">${timeAgo(note.updated)}</span>
                    </div>
                    <div class="card-preview">${esc(preview)}</div>
                    <div class="card-footer">
                        <span class="card-chars">${words} words &middot; ${chars} chars</span>
                        <button class="card-delete" onclick="event.stopPropagation(); confirmDelete(${note._i})" title="Delete">&times;</button>
                    </div>
                </div>`;
            }).join('') + (notes.length > 1 && !query ? `
                <div class="clear-all-bar">
                    <button class="btn-clear-all" onclick="confirmClearAll()">Delete All Notes</button>
                </div>` : '');
        }

        // ====== EDITOR ======
        function onEdit() {
            if (currentNote === null) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveCurrentNote();
                showToast();
            }, 600);
            updateStats();
        }

        function saveCurrentNote() {
            if (currentNote === null) return;
            const title = document.getElementById('editorTitle').value;
            const body = document.getElementById('editorTextarea').value;
            notes[currentNote].title = title;
            notes[currentNote].body = body;
            notes[currentNote].updated = Date.now();
            save();
        }

        function updateStats() {
            const body = document.getElementById('editorTextarea').value;
            const chars = body.length;
            const words = body.trim() ? body.trim().split(/\s+/).length : 0;
            const lines = body ? body.split('\n').length : 0;
            document.getElementById('editorStats').textContent = `${words} words \u00B7 ${chars} chars \u00B7 ${lines} lines`;
        }

        function updateColorPicker(color) {
            document.querySelectorAll('.color-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.c === color);
            });
        }

        function setColor(color) {
            if (currentNote === null) return;
            notes[currentNote].color = color;
            updateColorPicker(color);
            save();
        }

        // ====== ACTIONS ======
        function createNote() {
            const note = {
                title: '',
                body: '',
                color: 'gold',
                created: Date.now(),
                updated: Date.now()
            };
            notes.unshift(note);
            save();
            openNote(0);
        }

        function confirmDelete(index) {
            const title = notes[index].title.trim() || 'Untitled';
            showConfirm(`Delete "${esc(title)}"?`, () => {
                notes.splice(index, 1);
                save();
                if (currentNote !== null) goBack();
                else renderMaster();
            });
        }

        function confirmClearAll() {
            showConfirm('Delete all notes?', () => {
                notes = [];
                save();
                renderMaster();
            });
        }

        function showConfirm(msg, onYes) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <p>${msg}</p>
                    <div class="confirm-buttons">
                        <button class="btn-cancel">Cancel</button>
                        <button class="btn-confirm-delete">Delete</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.btn-cancel').onclick = () => overlay.remove();
            overlay.querySelector('.btn-confirm-delete').onclick = () => { overlay.remove(); onYes(); };
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Init
        renderMaster();
    </script>
</body>
</html>
